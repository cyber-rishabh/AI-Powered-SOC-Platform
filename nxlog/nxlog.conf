Panic Soft
#NoFreeOnExit TRUE

define ROOT    C:\Program Files\nxlog
define CERTDIR %ROOT%\cert
define CONFDIR %ROOT%\conf\nxlog.d
define LOGDIR  %ROOT%\data
define LOGFILE %LOGDIR%\nxlog.log

LogFile   %LOGFILE%
Moduledir %ROOT%\modules
CacheDir  %ROOT%\data
Pidfile   %ROOT%\data\nxlog.pid
SpoolDir  %ROOT%\data

include %CONFDIR%\\*.conf

########################################
# EXTENSIONS
########################################

<Extension _syslog>
    Module xm_syslog
</Extension>

<Extension _charconv>
    Module xm_charconv
    AutodetectCharsets iso8859-2, utf-8, utf-16, utf-32
</Extension>

<Extension _exec>
    Module xm_exec
</Extension>

<Extension _fileop>
    Module xm_fileop
    <Schedule>
        Every   1 hour
        Exec    if (file_exists('%LOGFILE%') and (file_size('%LOGFILE%') >= 5M)) file_cycle('%LOGFILE%', 8);
    </Schedule>
    <Schedule>
        When    @weekly
        Exec    if file_exists('%LOGFILE%') file_cycle('%LOGFILE%', 8);
    </Schedule>
</Extension>

# NOTE: xm_json removed entirely.
# NXLog CE 3.2 does not reliably support
# to_json() or OutputType JSON on om_http.
# Raw syslog text is sent instead.

########################################
# INPUTS
########################################

<Input in_security>
    Module      im_msvistalog
    Query       <QueryList><Query Id="0"><Select Path="Security">*</Select></Query></QueryList>
</Input>

<Input in_sysmon>
    Module      im_msvistalog
    Query       <QueryList><Query Id="0"><Select Path="Microsoft-Windows-Sysmon/Operational">*</Select></Query></QueryList>
</Input>

########################################
# OUTPUT 1 - SPLUNK (unchanged)
########################################

<Output out_syslog>
    Module om_udp
    Host   192.168.241.130
    Port   514
    Exec   to_syslog_ietf();
</Output>

########################################
# OUTPUT 2 - FASTAPI
#
# FIX: No JSON in NXLog CE at all.
# Send raw syslog string via om_http.
# ContentType: text/plain.
#
# FastAPI receives the raw syslog line
# as plain text body, wraps it as:
#   { "message": "<raw syslog line>" }
# then parses EventID/user/IP from it.
#
# One event per POST. No batching.
# No JSON errors. No 400 Bad Request.
########################################

<Output out_fastapi>
    Module      om_http
    URL         http://192.168.241.130:8001/logs
    ContentType text/plain
    Exec        to_syslog_ietf();
</Output>

########################################
# ROUTES
########################################

<Route r_security>
    Path in_security => out_syslog, out_fastapi
</Route>

<Route r_sysmon>
    Path in_sysmon => out_syslog, out_fastapi
</Route>
